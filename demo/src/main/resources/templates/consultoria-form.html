<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Consultoria | Consultoria Legal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" style="font-family: 'Poppins', sans-serif; color: #2563eb;" href="/">Consultoria Legal</a>
            <div class="d-flex gap-2">
                <a class="btn btn-outline-primary" href="/vista/consultorias">Volver a consultorias</a>
            </div>
        </div>
    </nav>

    <main class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body p-4 p-lg-5">
                            <span class="badge text-bg-primary mb-3">Modulo de consultorias</span>
                            <h1 class="h2 mb-3" style="font-family: 'Poppins', sans-serif; color: #1d4ed8;" th:text="${formTitle}">Nueva consultoria</h1>
                            <p class="text-secondary mb-4">Asocia la consultoria a un cliente y define su estado.</p>

                            <form th:action="${formAction}" th:object="${consultoriaForm}" method="post" class="row g-3">
                                <div class="col-md-6">
                                    <label for="tipo" class="form-label fw-semibold">Tipo</label>
                                    <input id="tipo" th:field="*{tipo}" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="estado" class="form-label fw-semibold">Estado</label>
                                    <select id="estado" th:field="*{estado}" class="form-select" required>
                                        <option value="">Selecciona un estado</option>
                                        <option th:each="estado : ${estadosConsultoria}" th:value="${estado.name()}" th:text="${estado.name()}"></option>
                                    </select>
                                </div>
                                <div class="col-12">
                                    <label for="clienteId" class="form-label fw-semibold">Cliente</label>
                                    <select id="clienteId" th:field="*{clienteId}" class="form-select" required>
                                        <option value="">Selecciona un cliente</option>
                                        <option th:each="cliente : ${clientes}" th:value="${cliente.id}" th:text="${cliente.nombre + ' - ' + (cliente.empresa != null and !#strings.isEmpty(cliente.empresa) ? cliente.empresa : 'Sin empresa')}"></option>
                                    </select>
                                </div>
                                <div class="col-12">
                                    <label for="descripcion" class="form-label fw-semibold">Descripcion</label>
                                    <textarea id="descripcion" th:field="*{descripcion}" class="form-control" rows="4" required></textarea>
                                </div>
                                <div class="col-12 d-flex gap-2 pt-2">
                                    <button type="submit" class="btn btn-primary">Guardar consultoria</button>
                                    <a href="/vista/consultorias" class="btn btn-outline-secondary">Cancelar</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
